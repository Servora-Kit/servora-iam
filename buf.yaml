version: v2

modules:
  - path: app/iam/service/api/protos
    name: buf.build/servora/servora-iam
  - path: app/sayhello/service/api/protos

deps:
  - buf.build/servora/servora
  - buf.build/googleapis/googleapis
  - buf.build/kratos/apis
  - buf.build/bufbuild/protovalidate
  - buf.build/gnostic/gnostic
  - buf.build/menta2k-org/redact

breaking:
  use:
    - FILE

lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE

packages:
  # Shared generated API clients (from Proto → TypeScript)
  # NOTE: generated code lives in api/gen/ts/ (managed by buf, do not put files there)
  #       this package acts as a stable wrapper so pnpm workspace can reference it
  - 'api/ts-client'
  # Shared frontend utilities (request handler, token management, etc.)
  - 'web/pkg'
  # Frontend applications
  - 'web/*'

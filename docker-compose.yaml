services:
  consul:
    image: consul:1.15.4
    container_name: servora_consul
    restart: unless-stopped
    command:
      - agent
      - -server
      - -ui
      - -node=consul-server-1
      - -bootstrap-expect=1
      - -client=0.0.0.0
      - -data-dir=/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - servora-consul-data:/consul/data
    networks:
      - servora-network

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: servora_jaeger
    restart: unless-stopped
    environment:
      JAEGER_LISTEN_HOST: 0.0.0.0
    ports:
      - "16686:16686"
    networks:
      - servora-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: servora_otel_collector
    user: "0:0"
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    healthcheck:
      test:
        [
          "CMD",
          "/otelcol-contrib",
          "validate",
          "--config=/etc/otelcol/config.yaml",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./manifests/otel/otel-collector.yaml:/etc/otelcol/config.yaml:ro
      - iam-logs:/var/log/iam:ro
      - sayhello-logs:/var/log/sayhello:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
      - loki
    networks:
      - servora-network

  loki:
    image: grafana/loki:latest
    container_name: servora_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "16685:3100"
    volumes:
      - ./manifests/loki/loki.yaml:/etc/loki/config.yaml:ro
      - servora-loki-data:/loki
    networks:
      - servora-network

  prometheus:
    image: prom/prometheus:latest
    container_name: servora_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./manifests/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - servora-prometheus-data:/prometheus
    networks:
      - servora-network

  grafana:
    image: grafana/grafana:latest
    container_name: servora_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_METRICS_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./manifests/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./manifests/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - servora-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - servora-network

  db:
    image: postgres:18-alpine
    container_name: servora_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: servora
      POSTGRES_PASSWORD: servora
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servora -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - servora-db-data:/var/lib/postgresql/data
      - ./manifests/scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - servora-network

  openfga-migrate:
    image: openfga/openfga:latest
    container_name: servora_openfga_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command:
      - migrate
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://servora:servora@db:5432/openfga?sslmode=disable
    networks:
      - servora-network

  openfga:
    image: openfga/openfga:latest
    container_name: servora_openfga
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      openfga-migrate:
        condition: service_completed_successfully
    command:
      - run
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://servora:servora@db:5432/openfga?sslmode=disable
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/healthz | grep -q SERVING",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "18080:8080"
      - "18081:8081"
      - "3002:3000"
    networks:
      - servora-network

  traefik:
    image: traefik:v3.6
    container_name: servora_traefik
    restart: unless-stopped
    depends_on:
      consul:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik.yaml
    ports:
      - "8080:80"
      - "8081:8080"
      - "8082:8082" # metrics (Prometheus scrape)
    volumes:
      - ./manifests/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - servora-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: servora_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - servora-network

  redis:
    image: redis:8.6.1-alpine
    container_name: servora_redis
    restart: unless-stopped
    command: redis-server --requirepass servora_redis_pwd --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "servora_redis_pwd", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - servora-redis-data:/data
    networks:
      - servora-network

  # ── Message Broker ──────────────────────────────────────────────────────────
  # Kafka KRaft mode (no ZooKeeper). Reference: /Users/horonlee/projects/go/Kemate
  kafka:
    image: apache/kafka:latest
    container_name: servora_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      # 单节点 KRaft 控制器与 broker 同进程，用 localhost 比 kafka:9093 更可靠
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      # 固定 Cluster ID：防止 volume 复用时触发 InconsistentClusterIdException
      KAFKA_CLUSTER_ID: "U3VyYW9LYWZrYUNsdXN0ZXI"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "9092:9092"
    volumes:
      - servora-kafka-data:/var/lib/kafka/data
    networks:
      - servora-network

  # ── Audit Storage ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: servora_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: servora_audit
      CLICKHOUSE_USER: servora
      CLICKHOUSE_PASSWORD: servora_ch_pwd
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user servora --password servora_ch_pwd --query 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "18123:8123" # HTTP interface
      - "19000:9000" # Native protocol
    volumes:
      - servora-clickhouse-data:/var/lib/clickhouse
    networks:
      - servora-network

volumes:
  servora-consul-data:
  servora-db-data:
  servora-redis-data:
  servora-loki-data:
  servora-prometheus-data:
  servora-grafana-data:
  servora-kafka-data:
  servora-clickhouse-data:
  iam-logs:
  sayhello-logs:

networks:
  servora-network:

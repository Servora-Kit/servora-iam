server:
  http:
    addr: "0.0.0.0:8000"
    timeout: 10s
  grpc:
    addr: "0.0.0.0:8001"
    timeout: 10s

data:
  database:
    driver: "postgres"
    source: "host=127.0.0.1 user=servora password=servora dbname=iam port=5432 sslmode=disable"
  redis:
    addr: "127.0.0.1:6379"
    password: "servora_redis_pwd"
    db: 0

app:
  env: "dev"
  external_url: "http://localhost:8000"
  jwt:
    private_key_path: "./configs/keys/iam.rsa.pem"
    access_expire: 3600
    refresh_expire: 604800
    issuer: "iam.service"
    audience: "servora"
  openfga:
    api_url: "http://localhost:8080"
    store_id: "${FGA_STORE_ID}"
    model_id: "${FGA_MODEL_ID}"
  oidc:
    crypto_key: "${OIDC_CRYPTO_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
    grant_type_refresh_token: true
    default_logout_redirect_uri: "http://localhost:3000"
  log:
    level: 0
    filename: "./logs/iam.service.log"
    max_size: 20
    max_age: 30
    max_backups: 10

mail:
  smtp:
    host: "127.0.0.1"
    port: 1025
    tls: false
  from:
    address: "noreply@servora.dev"
    name: "Servora"
  base_url: "http://localhost:3000"
  # 可选：自定义邮件 HTML 模板目录，不设则使用内嵌默认
  # template_dir: "./configs/mail-templates"

trace:
  endpoint: "localhost:4317"
  insecure: true
  sampling_ratio: 1.0

metrics:
  enable: true

registry:
  consul:
    addr: "${REGISTRY_CONSUL_ADDR:localhost:8500}"
    scheme: "${REGISTRY_CONSUL_SCHEME:http}"
    datacenter: "${REGISTRY_CONSUL_DC:dc1}"
    tags:
      - "traefik.enable=true"
      # 公开认证入口（登录、注册、刷新、ForwardAuth 校验端点、Cap 人机验证），不挂 ForwardAuth
      - "traefik.http.routers.iam-auth-public.rule=Path(`/v1/auth/login/email-password`) || Path(`/v1/auth/signup/using-email`) || Path(`/v1/auth/refresh-token`) || Path(`/v1/auth/verify`) || PathPrefix(`/v1/cap/`) || Path(`/v1/auth/request-email-verification`) || Path(`/v1/auth/verify-email`) || Path(`/v1/auth/request-password-reset`) || Path(`/v1/auth/reset-password`)"
      - "traefik.http.routers.iam-auth-public.entrypoints=web"
      - "traefik.http.routers.iam-auth-public.priority=300"
      - "traefik.http.routers.iam-auth-public.service=iam-http"
      # 需鉴权的 /v1 业务路由，网关先调 IAM /v1/auth/verify 再转发并注入 X-User-ID
      - "traefik.http.routers.iam-api.rule=PathPrefix(`/v1`)"
      - "traefik.http.routers.iam-api.entrypoints=web"
      - "traefik.http.routers.iam-api.priority=100"
      - "traefik.http.routers.iam-api.middlewares=iam-forwardauth"
      - "traefik.http.routers.iam-api.service=iam-http"
      - "traefik.http.routers.iam-healthz.rule=Path(`/healthz`)"
      - "traefik.http.routers.iam-healthz.entrypoints=web"
      - "traefik.http.routers.iam-healthz.service=iam-http"
      - "traefik.http.services.iam-http.loadbalancer.server.port=8000"
      # ForwardAuth 中间件（本地 IAM 若在宿主机跑，可改为 host.docker.internal:8000）
      - "traefik.http.middlewares.iam-forwardauth.forwardauth.address=http://iam:8000/v1/auth/verify"
      - "traefik.http.middlewares.iam-forwardauth.forwardauth.trustForwardHeader=false"
      - "traefik.http.middlewares.iam-forwardauth.forwardauth.authRequestHeaders=Authorization"
      - "traefik.http.middlewares.iam-forwardauth.forwardauth.authResponseHeaders=X-User-ID"

discovery:
  consul:
    addr: "${DISCOVERY_CONSUL_ADDR:localhost:8500}"
    scheme: "${DISCOVERY_CONSUL_SCHEME:http}"
    datacenter: "${DISCOVERY_CONSUL_DC:dc1}"

syntax = "proto3";

package iam.service.v1;

import "authz/service/v1/authz.proto";
import "google/api/annotations.proto";
import "tenant/service/v1/tenant.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

service TenantService {
  rpc CreateTenant(tenant.service.v1.CreateTenantRequest) returns (tenant.service.v1.CreateTenantResponse) {
    option (google.api.http) = {
      post: "/v1/tenants"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc GetTenant(tenant.service.v1.GetTenantRequest) returns (tenant.service.v1.GetTenantResponse) {
    option (google.api.http) = {get: "/v1/tenants/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_VIEW
      id_field: "id"
    };
  }

  rpc ListTenants(tenant.service.v1.ListTenantsRequest) returns (tenant.service.v1.ListTenantsResponse) {
    option (google.api.http) = {get: "/v1/tenants"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc UpdateTenant(tenant.service.v1.UpdateTenantRequest) returns (tenant.service.v1.UpdateTenantResponse) {
    option (google.api.http) = {
      put: "/v1/tenants/{id}"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
      id_field: "id"
    };
  }

  rpc DeleteTenant(tenant.service.v1.DeleteTenantRequest) returns (tenant.service.v1.DeleteTenantResponse) {
    option (google.api.http) = {delete: "/v1/tenants/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
      id_field: "id"
    };
  }

  rpc InviteMember(tenant.service.v1.InviteTenantMemberRequest) returns (tenant.service.v1.InviteTenantMemberResponse) {
    option (google.api.http) = {
      post: "/v1/tenants/{tenant_id}/members"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE_MEMBERS
      id_field: "tenant_id"
    };
  }

  rpc AcceptInvitation(tenant.service.v1.AcceptTenantInvitationRequest) returns (tenant.service.v1.AcceptTenantInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/tenants/{tenant_id}/invitations/accept"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc RejectInvitation(tenant.service.v1.RejectTenantInvitationRequest) returns (tenant.service.v1.RejectTenantInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/tenants/{tenant_id}/invitations/reject"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc ListMembers(tenant.service.v1.ListTenantMembersRequest) returns (tenant.service.v1.ListTenantMembersResponse) {
    option (google.api.http) = {get: "/v1/tenants/{tenant_id}/members"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_VIEW
      id_field: "tenant_id"
    };
  }

  rpc UpdateMemberRole(tenant.service.v1.UpdateTenantMemberRoleRequest) returns (tenant.service.v1.UpdateTenantMemberRoleResponse) {
    option (google.api.http) = {
      put: "/v1/tenants/{tenant_id}/members/{user_id}/role"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE_MEMBERS
      id_field: "tenant_id"
    };
  }

  rpc RemoveMember(tenant.service.v1.RemoveTenantMemberRequest) returns (tenant.service.v1.RemoveTenantMemberResponse) {
    option (google.api.http) = {delete: "/v1/tenants/{tenant_id}/members/{user_id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE_MEMBERS
      id_field: "tenant_id"
    };
  }
}

syntax = "proto3";

package iam.service.v1;

import "authn/service/v1/authn.proto";
import "google/api/annotations.proto";
import "servora/authz/v1/authz.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

service AuthnService {
  rpc SignupByEmail(authn.service.v1.SignupByEmailRequest) returns (authn.service.v1.SignupByEmailResponse) {
    option (google.api.http) = {
      post: "/v1/auth/signup/using-email"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc LoginByEmailPassword(authn.service.v1.LoginByEmailPasswordRequest) returns (authn.service.v1.LoginByEmailPasswordResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login/email-password"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc RefreshToken(authn.service.v1.RefreshTokenRequest) returns (authn.service.v1.RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh-token"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc Logout(authn.service.v1.LogoutRequest) returns (authn.service.v1.LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc ChangePassword(authn.service.v1.ChangePasswordRequest) returns (authn.service.v1.ChangePasswordResponse) {
    option (google.api.http) = {
      post: "/v1/auth/change-password"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc LogoutAllDevices(authn.service.v1.LogoutAllDevicesRequest) returns (authn.service.v1.LogoutAllDevicesResponse) {
    option (google.api.http) = {
      post: "/v1/auth/logout-all"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc RequestEmailVerification(authn.service.v1.RequestEmailVerificationRequest) returns (authn.service.v1.RequestEmailVerificationResponse) {
    option (google.api.http) = {
      post: "/v1/auth/request-email-verification"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc VerifyEmail(authn.service.v1.VerifyEmailRequest) returns (authn.service.v1.VerifyEmailResponse) {
    option (google.api.http) = {
      post: "/v1/auth/verify-email"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc RequestPasswordReset(authn.service.v1.RequestPasswordResetRequest) returns (authn.service.v1.RequestPasswordResetResponse) {
    option (google.api.http) = {
      post: "/v1/auth/request-password-reset"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc ResetPassword(authn.service.v1.ResetPasswordRequest) returns (authn.service.v1.ResetPasswordResponse) {
    option (google.api.http) = {
      post: "/v1/auth/reset-password"
      body: "*"
    };
    option (servora.authz.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }
}

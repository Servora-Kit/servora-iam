syntax = "proto3";

package user.service.v1;

import "buf/validate/validate.proto";
import "errors/errors.proto";
import "pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/user/service/v1;userpb";
option java_multiple_files = true;
option java_outer_classname = "UserProtoV1";
option java_package = "dev.servora.api.user.v1";

// 错误码定义
enum ErrorReason {
  // 设置缺省错误码
  option (errors.default_code) = 500;
  // 用户未找到
  USER_NOT_FOUND = 0 [(errors.code) = 404];
  // 删除用户失败
  DELETE_USER_FAILED = 1 [(errors.code) = 500];
  // 更新用户信息失败
  UPDATE_USER_FAILED = 2 [(errors.code) = 500];
  // 保存用户信息失败
  SAVE_USER_FAILED = 3 [(errors.code) = 500];
  // 创建用户失败
  CREATE_USER_FAILED = 4 [(errors.code) = 500];
}

// User gRPC 服务 - 纯 gRPC 接口
service UserService {
  rpc CurrentUserInfo(CurrentUserInfoRequest) returns (CurrentUserInfoResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc PurgeUser(PurgeUserRequest) returns (PurgeUserResponse);
  rpc RestoreUser(RestoreUserRequest) returns (RestoreUserResponse);
}

message UserInfo {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  bool email_verified = 5;
  repeated string organization_ids = 6;
}

message CurrentUserInfoRequest {}

message CurrentUserInfoResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
}

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetUserResponse {
  UserInfo user = 1;
}

message ListUsersRequest {
  pagination.v1.PaginationRequest pagination = 1;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
  pagination.v1.PaginationResponse pagination = 2;
}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteUserResponse {
  bool success = 1;
}

message PurgeUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message PurgeUserResponse {
  bool success = 1;
}

message RestoreUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message RestoreUserResponse {
  UserInfo user = 1;
}

message UpdateUserRequest {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
}

message UpdateUserResponse {
  UserInfo user = 1;
}

message CreateUserRequest {
  string name = 1 [(buf.validate.field).string.min_len = 2];
  string email = 2 [(buf.validate.field).string.email = true];
  string password = 3 [(buf.validate.field).string = {
    min_len: 5
    max_len: 64
  }];
  string organization_id = 4 [(buf.validate.field).string.uuid = true];
}

message CreateUserResponse {
  string id = 1;
}

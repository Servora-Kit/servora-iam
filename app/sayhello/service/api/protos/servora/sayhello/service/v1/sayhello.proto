// based on https://grpc.io/docs/guides/concepts.html
syntax = "proto3";

package servora.sayhello.service.v1;

import "buf/validate/validate.proto";
import "servora/audit/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora-iam/api/gen/go/servora/sayhello/service/v1;sayhellopb";
option java_multiple_files = true;
option java_outer_classname = "SayHelloProtoV1";
option java_package = "dev.servora.api.sayhello.v1";

// SayHello 定义一个简单的 Hello 服务
service SayHelloService {
  rpc Hello(HelloRequest) returns (HelloResponse) {
    option (servora.audit.v1.audit_rule) = {
      enabled: true
      event_type: AUDIT_EVENT_TYPE_RESOURCE_MUTATION
      mutation_type: RESOURCE_MUTATION_TYPE_CREATE
      target_type: "greeting"
      record_on_error: true
    };
  }
}

// HelloRequest 是 Hello 服务的请求消息
message HelloRequest {
  string greeting = 1 [(buf.validate.field).required = true];
}

// HelloResponse 是 Hello 服务的响应消息
message HelloResponse {
  string reply = 1;
}

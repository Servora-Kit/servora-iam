# docker-compose.dev.yaml — Dev-mode service overrides (Air hot-reload).
#
# IAM and sayhello are retained as reference code but removed from the toolchain.
# Infrastructure services (kafka, clickhouse, etc.) are defined in docker-compose.yaml.
services:
  audit:
    container_name: audit
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.air
    working_dir: /workspace/app/audit/service
    command: ["air", "-c", ".air.toml"]
    environment:
      TZ: Asia/Shanghai
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /go/cache
    volumes:
      - ./:/workspace
      - ./.cache/go-mod:/go/pkg/mod
      - ./.cache/go-build:/go/cache
      - ./app/audit/service/configs/docker/:/app/configs/
      - audit-logs:/app/logs
    ports:
      - "10000:8000"
      - "10001:8001"
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - servora-network

  sayhello:
    container_name: sayhello
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.air
    working_dir: /workspace/app/sayhello/service
    command: ["air", "-c", ".air.toml"]
    environment:
      TZ: Asia/Shanghai
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /go/cache
    volumes:
      - ./:/workspace
      - ./.cache/go-mod:/go/pkg/mod
      - ./.cache/go-build:/go/cache
      - ./app/sayhello/service/configs/docker/:/app/configs/
      - sayhello-logs:/app/logs
    ports:
      - "10002:8000"
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - servora-network

volumes:
  audit-logs:
  sayhello-logs:

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: servora-service
    metrics_path: /metrics
    static_configs:
      - targets: ["servora:8000"]
        labels:
          service: servora.service
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki
  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets: ["jaeger:8888"]
        labels:
          service: jaeger
  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana

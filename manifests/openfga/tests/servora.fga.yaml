name: servora authorization model tests
model_file: ../model/servora.fga

tuples:
  # Platform admin
  - user: user:platform-admin
    relation: admin
    object: platform:default

  # Application with platform link
  - user: platform:default
    relation: platform
    object: application:app-1

  # Application with direct user admin
  - user: user:app-owner
    relation: admin
    object: application:app-2

tests:
  # --- Platform tests ---

  - name: platform admin has admin and can manage users and applications
    check:
      - user: user:platform-admin
        object: platform:default
        assertions:
          admin: true
          can_manage_users: true
          can_manage_applications: true

  - name: non-admin has no platform permissions
    check:
      - user: user:regular-user
        object: platform:default
        assertions:
          admin: false
          can_manage_users: false
          can_manage_applications: false

  # --- Application tests ---

  - name: platform admin inherits application admin via platform relation
    check:
      - user: user:platform-admin
        object: application:app-1
        assertions:
          admin: true
          can_view: true
          can_manage: true

  - name: direct app admin can view and manage
    check:
      - user: user:app-owner
        object: application:app-2
        assertions:
          admin: true
          can_view: true
          can_manage: true

  - name: unrelated user has no application permissions
    check:
      - user: user:regular-user
        object: application:app-1
        assertions:
          admin: false
          can_view: false
          can_manage: false

  - name: app-owner cannot access other applications
    check:
      - user: user:app-owner
        object: application:app-1
        assertions:
          admin: false
          can_view: false
          can_manage: false

  - name: platform admin without platform link has no app-2 permissions
    check:
      - user: user:platform-admin
        object: application:app-2
        assertions:
          admin: false
          can_view: false
          can_manage: false

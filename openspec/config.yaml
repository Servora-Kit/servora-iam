schema: spec-driven

context: |
  项目：servora —— 基于 Go Kratos v2 的微服务快开框架，采用 DDD 分层与 Proto First 开发方式。

  技术栈：
  - 语言：Go 1.26+
  - 框架：Kratos v2（微服务框架，双协议 gRPC + HTTP）
  - API：Protobuf + Buf（Proto First，buf lint/generate）
  - DI：Google Wire（编译时依赖注入）
  - ORM：Ent（主）+ GORM GEN（并行）
  - 存储：MySQL / PostgreSQL / SQLite + Redis
  - 前端：Vue 3 + Vite + TypeScript（app/servora/service/web/ 目录）
  - 服务治理：Consul / Nacos / etcd
  - 可观测性：OTel Collector + Jaeger + Loki + Prometheus + Grafana
  - CLI 工具：cmd/svr（当前提供 svr gen gorm）

  架构约定：
  - DDD 分层：service → biz → data，职责边界严格
  - Proto 组织：共享 proto 放在 api/protos/，服务私有 proto 放在 app/<service>/service/api/protos/
  - 每个微服务独立目录：app/<service>/service/
  - 共享库放 pkg/，不允许跨服务直接引用 internal/
  - 代码生成产物（api/gen/go/、wire_gen.go、openapi.yaml）不手动修改
  - 所有 svr 命令须在项目根目录执行

  命名约定：
  - Proto 文件名：snake_case.proto
  - Proto 包名：<service>.service.v1（点分，与目录结构对应）
  - 服务名：PascalCase + Service 后缀（如 SayHelloService）
  - RPC 请求/响应消息：HelloRequest / HelloResponse（不加服务名前缀）
  - Go 包名遵循目录名，错误类型使用 Kratos errors 机制

  测试约定：
  - 单元测试与源文件同目录，文件名 *_test.go
  - 集成测试使用真实数据库（testcontainers 或 sqlite）
  - 提交前须通过 make lint.go && make test

rules:
  proposal:
    - 保持简洁（1-2 页），聚焦"为什么"而非"怎么做"
    - Capabilities 中的每个新功能名称使用 kebab-case，将在 specs/ 下创建对应文件
    - 破坏性变更必须用 BREAKING 标注
  design:
    - 技术决策必须说明"选 X 而不是 Y 的原因"
    - 涉及新外部依赖时须评估对 go.mod 的影响
    - 涉及 Proto 变更时须说明是否影响已有 buf generate 流程
  specs:
    - 需求描述必须包含 SHALL / MUST / 必须 / 禁止 等规范性词汇
    - 每个需求至少有一个场景，场景使用 当/那么（WHEN/THEN）格式
    - 场景标题使用 4 个井号（####），不得使用 3 个或列表形式
  tasks:
    - 每个任务须可独立验证（能明确判断是否完成）
    - 验证任务放在最后一组，包含编译检查和冒烟测试
    - 涉及 Proto 修改的任务须包含 make gen 步骤

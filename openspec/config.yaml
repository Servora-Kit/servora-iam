schema: spec-driven

context: |
  Tech stack: Go (Kratos framework), Buf v2 (proto), Wire (DI), Ent (ORM), GORM GEN
  Frontend: TypeScript, React, Vite, pnpm monorepo
  Infrastructure: Traefik (gateway), PostgreSQL, Redis, OpenFGA, Consul, OTel, Jaeger, Loki, Grafana
  Planned additions: Keycloak (authn), Kafka (broker/audit), ClickHouse (audit storage)
  Conventions: conventional commits (type(scope): description), Go workspace + multi-module, Buf v2 workspace
  Architecture: microservice scaffold framework with pkg/ ecosystem + app/ service implementations
  Key packages: pkg/actor, pkg/authn, pkg/authz, pkg/openfga, pkg/broker (new), pkg/audit (new)
  Proto codegen: protoc-gen-servora-authz (existing), protoc-gen-servora-audit (planned)
  Reference projects: /Users/horonlee/projects/go/kratos-transport (broker interface design), /Users/horonlee/projects/go/Kemate (Kafka + audit service pattern)
  Existing services: app/iam/service (deprecated as active service, retained as reference), app/sayhello/service (same)
  Design doc: docs/plans/2026-03-20-keycloak-openfga-audit-design.md (master plan, 5 phases)

rules:
  proposal:
    - Always include a "Non-goals" section
    - Reference the master design doc phase number
    - Keep scope tightly bounded to one phase
  design:
    - Include ASCII architecture diagrams where helpful
    - Reference kratos-transport broker interfaces when designing pkg/broker
    - Reference Kemate patterns when designing Kafka/audit integration
    - Specify breaking changes explicitly with migration notes
  tasks:
    - Break tasks into chunks of max 4 hours
    - Group related tasks into logical sections
    - Mark tasks that require make gen or make api regeneration
    - Include infrastructure tasks (docker-compose, configs) alongside code tasks
